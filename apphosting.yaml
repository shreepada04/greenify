# Firebase App Hosting — https://firebase.google.com/docs/app-hosting/configure
# Set sensitive values in Firebase Console → App Hosting → your backend → Settings → Environment
# Or use Secret Manager: firebase apphosting:secrets:set VARIABLE_NAME

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # After your first deploy, set NEXTAUTH_URL to your live URL, e.g.:
  # https://YOUR_BACKEND_ID--YOUR_PROJECT_ID.us-central1.hosted.app
  # Uncomment and use secrets once created in Secret Manager:
  #
  # - variable: MONGODB_URI
  #   secret: MONGODB_URI
  # - variable: JWT_SECRET
  #   secret: JWT_SECRET
  # - variable: JWT_REFRESH_SECRET
  #   secret: JWT_REFRESH_SECRET
  # - variable: NEXTAUTH_URL
  #   secret: NEXTAUTH_URL
  # - variable: NEXTAUTH_SECRET
  #   secret: NEXTAUTH_SECRET
  # - variable: GOOGLE_CLIENT_ID
  #   secret: GOOGLE_CLIENT_ID
  # - variable: GOOGLE_CLIENT_SECRET
  #   secret: GOOGLE_CLIENT_SECRET
  # - variable: IMAGEKIT_PUBLIC_KEY
  #   secret: IMAGEKIT_PUBLIC_KEY
  # - variable: IMAGEKIT_PRIVATE_KEY
  #   secret: IMAGEKIT_PRIVATE_KEY
  # - variable: IMAGEKIT_URL_ENDPOINT
  #   secret: IMAGEKIT_URL_ENDPOINT
